name: Test -> Production Build -> Deploy

on:
  push:
    branches:
      - main

jobs:
  test-and-build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle (with cache)
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: |
          ./gradlew :composeApp:composeCompatibilityBrowserDistribution

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@4
        with:
          branch: gh-pages
          folder: composeApp/build/dist/composeWebCompatibility/productionExecutable